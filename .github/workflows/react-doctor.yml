name: React Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: millionco/react-doctor@main
        with:
          diff: main
          fail-on: error