name: React Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: millionco/react-doctor@react-doctor@0.0.31
        with:
          diff: main
          fail-on: error
