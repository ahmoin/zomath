name: Fallow

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  fallow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: fallow-rs/fallow@v2
        with:
          command: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}